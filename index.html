<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>L´Essence</title>
<link rel="icon" href="Icono L´Essence copia.jpg">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: #c9a96e;
    text-decoration: none;
    font-weight: bold;
    padding: 8px 14px;
    border-radius: 8px;
    transition: 0.3s;
}

nav a:hover {
    background: #c9a96e;
    color: black;
}

/* DROPDOWN (PC) */
.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    top: 45px;
    background: #111;
    border-radius: 8px;
    border: 1px solid #222;
    overflow: hidden;
}

.dropdown-content a {
    display: block;
    padding: 10px;
    color: #c9a96e;
    text-decoration: none;
}

.dropdown-content a:hover {
    background: #c9a96e;
    color: black;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('banner.jpg');
    background-size: cover;
    background-position: center;
}

.hero img {
    width: 130px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 15px rgba(201,169,110,0.5));
    animation: glow 2s infinite alternate;
}

.hero h1 {
    font-size: 50px;
}

.hero p {
    color: #ccc;
}

/* BOTONES */
.btn {
    margin-top: 20px;
    padding: 14px 30px;
    border-radius: 30px;
    background: linear-gradient(45deg, #c9a96e, #e6c88f);
    color: black;
    text-decoration: none;
    font-weight: bold;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 60px 20px;
}

.card {
    position: relative;
    height: 300px;
    border-radius: 15px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-content {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 20px;
    background: linear-gradient(transparent, black);
}

.card h3 {
    margin: 0;
    color: #c9a96e;
}

/* SUB BOTONES PERFUMES */
.sub-buttons {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.3s;
}

.sub-buttons a {
    background: #c9a96e;
    color: black;
    text-decoration: none;
    padding: 6px;
    border-radius: 6px;
    font-size: 14px;
}

.card:hover .sub-buttons {
    opacity: 1;
    transform: translateY(0);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    color: #aaa;
    background: black;
}

/* ANIMACION */
@keyframes glow {
    from {
        filter: drop-shadow(0 0 10px rgba(201,169,110,0.4));
    }
    to {
        filter: drop-shadow(0 0 25px rgba(201,169,110,0.9));
    }
}

/* 📱 NAV EN GRILLA (3 COLUMNAS) */
@media (max-width: 600px) {

    nav {
        display: grid;
        grid-template-columns: repeat(3, 90px); /* tamaño fijo */
        justify-content: center; /* centra todo el bloque */
        gap: 12px;
        padding: 15px 0;
    }

    nav a,
    .dropdown > a {
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        height: 45px;
        width: 90px;
        font-size: 13px;
    }

    /* ocultar dropdown en celular */
    .dropdown-content {
        display: none !important;
    }
}
    
}
}

</style>
</head>

<body>

<nav>
    <a href="index.html">Inicio</a>

    <div class="dropdown">
        <a href="pruebacatalogo3.html">Perfumes</a>
        <div class="dropdown-content">
            <a href="pruebacatalogo3.html">Hombre</a>
            <a href="catalogomujer.html">Mujer</a>
        </div>
    </div>

    <a href="catalogo-decants.html">Decants</a>
    <a href="informacion1.html">Información</a>
    <a href="contacto1.html">Contacto</a>
</nav>

<section class="hero">
    <img src="Icono L´Essence copia.jpg">
    <h1>L´Essence</h1>
    <p>Fragancias exclusivas de alta gama</p>

    <a href="pruebacatalogo3.html" class="btn">Ver Perfumes</a>
</section>

<section class="grid">

    <div class="card">
        <img src="banner perfume.jpg">
        <div class="card-content">
            <h3>Perfumes</h3>

            <div class="sub-buttons">
                <a href="pruebacatalogo3.html">Hombre</a>
                <a href="catalogomujer.html">Mujer</a>
            </div>
        </div>
    </div>

    <a href="catalogo-decants.html" class="card">
        <img src="banner decant.jpg">
        <div class="card-content">
            <h3>Decants</h3>
        </div>
    </a>

</section>

<footer>
    <p>General Deheza y Río Cuarto, Argentina</p>
    <small>&copy; 2026 L´Essence</small>
</footer>

</body>
</html>
