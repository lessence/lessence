<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Catálogo</title>
<link rel="icon" href="Icono L´Essence copia.jpg" type="jpg" sizes="16x16">

<style>
body {
    font-family: Arial;
    margin:0;
    background:#0f0f0f;
    color:white;
}

header {
    background:black;
    text-align:center;
    padding:30px;
    letter-spacing:2px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    padding:30px;
}

.card {
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

.card img {
    width:100%;
    height:200px;
    object-fit:contain;
    background:#fff;
    border-radius:8px;
    margin-bottom:10px;
}

.price {
    color:#c9a96e;
    font-weight:bold;
    margin:10px 0;
}

.btn {
    background:#c9a96e;
    color:black;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover {
    background:white;
}

.btn-carrito {
    position: fixed;
    top: 20px;
    right: 20px;
    background:#c9a96e;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    z-index:1000;
    font-weight:bold;
}

.carrito {
    position:fixed;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:#111;
    padding:15px;
    overflow-y:auto;
    border-left:2px solid #c9a96e;
    transform: translateX(100%);
    transition: 0.4s ease;
}

.carrito.abierto {
    transform: translateX(0);
}

.item {
    border-bottom:1px solid #333;
    padding:10px 0;
}

.total {
    font-weight:bold;
    margin-top:15px;
    color:#c9a96e;
}

.btn-volver {
    display: inline-block;
    margin: 20px;
    background: #c9a96e;
    color: black;
    padding: 8px 15px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}
    /* RESPONSIVE PARA CELULAR */
@media (max-width: 600px) {

    header {
        padding: 40px 10px;
    }

    header img {
        width: 120px;
    }

    header h1 {
        font-size: 22px;
    }

    nav a {
        display: block;
        margin: 10px 0;
    }

    .hero {
        padding: 60px 15px;
    }

    .hero h1 {
        font-size: 26px;
    }

    .hero p {
        font-size: 14px;
    }

    .btn {
        font-size: 16px;
        padding: 10px 20px;
    }

    .section {
        padding: 40px 15px;
    }

    .section p {
        font-size: 14px;
    }
}
</style>
</head>

<body>

let carrito = [];

const grid = document.getElementById("grid");
const items = document.getElementById("items");
const totalEl = document.getElementById("total");

function mostrar(){
grid.innerHTML="";
perfumes.forEach(p=>{
grid.innerHTML += `
<div class="card">
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p class="price">$${p.precio}</p>
<button class="btn" onclick='agregar("${p.nombre}", ${p.precio})'>Agregar</button>
</div>
`;
});
}

function agregar(nombre, precio){
carrito.push({nombre, precio});
renderCarrito();
document.getElementById("carrito").classList.add("abierto");
}

function renderCarrito(){
items.innerHTML="";
let total = 0;

carrito.forEach((p,i)=>{
total += p.precio;

items.innerHTML += `
<div class="item">
${p.nombre} - $${p.precio}
<button onclick="eliminar(${i})">❌</button>
</div>
`;
});

totalEl.innerText = "Total: $" + total;
}

function eliminar(i){
carrito.splice(i,1);
renderCarrito();
}

function comprar(){
if(carrito.length === 0){
alert("El carrito está vacío");
return;
}

let mensaje = "Hola, quiero comprar:%0A";

carrito.forEach(p=>{
mensaje += "- " + p.nombre + " ($" + p.precio + ")%0A";
});

window.open("https://wa.me/5493584114412?text=" + mensaje);
}

function toggleCarrito(){
const c = document.getElementById("carrito");
c.classList.toggle("abierto");
}

mostrar();
