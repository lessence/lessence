<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>
<link rel="icon" href="Icono L´Essence copia.jpg" type="jpg" sizes="16x16">

<style>
body {
    font-family: Arial;
    margin:0;
    background:#0f0f0f;
    color:white;
}

header {
    background:black;
    text-align:center;
    padding:30px;
    letter-spacing:2px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    padding:30px;
}

.card {
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
    overflow:hidden;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

/* IMÁGENES */
.card img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:10px;
    transition: transform 0.4s ease;
}

.card:hover img {
    transform: scale(1.1);
}

.card h3 {
    font-weight:400;
}

.price {
    color:#c9a96e;
    font-weight:bold;
    margin:10px 0;
}

.btn {
    background:#c9a96e;
    color:black;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    background:white;
    transform: scale(1.05);
}

.btn:active {
    transform: scale(0.9);
}

/* BOTÓN CARRITO */
.btn-carrito {
    position: fixed;
    top: 20px;
    right: 20px;
    background:#c9a96e;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    z-index:1000;
    font-weight:bold;
}

/* CARRITO */
.carrito {
    position:fixed;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:#111;
    padding:15px;
    overflow-y:auto;
    border-left:2px solid #c9a96e;
    transform: translateX(100%);
    transition: 0.4s ease;
}

.carrito.abierto {
    transform: translateX(0);
}

.item {
    border-bottom:1px solid #333;
    padding:10px 0;
    font-size:14px;
}

.item button {
    background:red;
    border:none;
    color:white;
    cursor:pointer;
    margin-left:5px;
}

.total {
    font-weight:bold;
    margin-top:15px;
    color:#c9a96e;
}

.btn-volver {
    display: inline-block;
    margin: 20px;
    background: #c9a96e;
    color: black;
    padding: 8px 15px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-volver:hover {
    background: white;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="btn-volver">← Volver al inicio</a>
<h1>L´ESSENCE</h1>
<p style="color:#aaa;">Catálogo exclusivo</p>
</header>

<button class="btn-carrito" onclick="toggleCarrito()">🛒</button>

<main>
<div class="grid" id="grid"></div>
</main>

<div class="carrito" id="carrito">
<h2>🛒 Carrito</h2>
<div id="items"></div>
<p class="total" id="total">$0</p>
<button class="btn" onclick="comprar()">Finalizar compra</button>
</div>

<script>

const perfumes = [
{nombre:"KHAMRAH", precio:50000, img:1},
{nombre:"KHAMRAH QAHWA", precio:49000, img:2},
{nombre:"PHILOS PURA", precio:50000, img:3},
{nombre:"9 PM", precio:58000, img:4},
{nombre:"CDN INTENSE MAN EDT 105ML", precio:70000, img:5},
{nombre:"CDN URBAN MAN ELIXIR 105ML", precio:72000, img:6},
{nombre:"FAKHAR BLACK", precio:55000, img:7},
{nombre:"OUD FOR GLORY", precio:50000, img:8},
{nombre:"HONOR AND GLORY", precio:51000, img:9},
{nombre:"ASAD BOURBON", precio:60000, img:10},
{nombre:"ASAD", precio:55000, img:11},
{nombre:"HIS CONFESSION", precio:62000, img:12},
{nombre:"THE KINGDOM", precio:60000, img:13},
{nombre:"9 AM DIVE", precio:65000, img:14},
{nombre:"MANDARIN SKY", precio:58000, img:15},
{nombre:"LIQUID BRUN", precio:72000, img:16},
{nombre:"ODYSSEY AQUA", precio:74000, img:17},
{nombre:"HAWAS CLASICO", precio:56000, img:18},
{nombre:"HAWAS ICE", precio:85000, img:19},

{nombre:"ASAD ZANZIBAR", precio:55000, img:20},
{nombre:"CONFIDENTIAL GOLD", precio:45000, img:21},
{nombre:"HAYAATI", precio:43000, img:22},
{nombre:"LATTAFA PISA", precio:80000, img:23},
{nombre:"ART OF UNIVERSE", precio:70000, img:24},
{nombre:"QAED AL FURSAN", precio:45000, img:25},
{nombre:"VINTAGE RADIO", precio:56000, img:26},
{nombre:"AQUA DUBAI 100ML", precio:100000, img:27},
{nombre:"GOLD EDITION 120ML", precio:95000, img:28}
];

let carrito = [];

const grid = document.getElementById("grid");
const items = document.getElementById("items");
const totalEl = document.getElementById("total");

function mostrar(){
grid.innerHTML="";
perfumes.forEach((p)=>{
grid.innerHTML += `
<div class="card">
<img src="perfume${p.img}.jpg">
<h3>${p.nombre}</h3>
<p class="price">$${p.precio}</p>
<button class="btn" onclick='agregar("${p.nombre}", ${p.precio})'>Agregar</button>
</div>
`;
});
}

function agregar(nombre, precio){
carrito.push({nombre, precio});
renderCarrito();
document.getElementById("carrito").classList.add("abierto");
}

function renderCarrito(){
items.innerHTML="";
let total = 0;

carrito.forEach((p,i)=>{
total += p.precio;

items.innerHTML += `
<div class="item">
${p.nombre} - $${p.precio}
<button onclick="eliminar(${i})">❌</button>
</div>
`;
});

totalEl.innerText = "Total: $" + total;
}

function eliminar(i){
carrito.splice(i,1);
renderCarrito();
}

function comprar(){
if(carrito.length === 0){
alert("El carrito está vacío");
return;
}

let mensaje = "Hola, quiero comprar:%0A";

carrito.forEach(p=>{
mensaje += "- " + p.nombre + " ($" + p.precio + ")%0A";
});

window.open("https://wa.me/5493584114412?text=" + mensaje);
}

function toggleCarrito(){
const c = document.getElementById("carrito");
c.classList.toggle("abierto");
}

mostrar();

</script>

</body>
</html>
